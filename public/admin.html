<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Rudra Capital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a3a5f;
            margin-bottom: 30px;
            text-align: center;
        }
        .contact-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .contact-item h3 {
            color: #1a3a5f;
            margin-bottom: 10px;
        }
        .contact-item p {
            margin-bottom: 5px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rudra Capital - Contact Submissions</h1>
        <div id="contacts-container" class="loading">Loading contacts...</div>
    </div>

    <script>
        async function loadContacts() {
            try {
                const response = await fetch('/api/contacts');
                const contacts = await response.json();
                
                const container = document.getElementById('contacts-container');
                
                if (contacts.length === 0) {
                    container.innerHTML = '<p>No contacts yet.</p>';
                    return;
                }
                
                container.innerHTML = contacts.map(contact => `
                    <div class="contact-item">
                        <h3>${contact.name} - ${contact.subject}</h3>
                        <p><strong>Email:</strong> ${contact.email || 'Not provided'}</p>
                        <p><strong>Phone:</strong> ${contact.phone}</p>
                        <p><strong>Message:</strong> ${contact.message}</p>
                        <p><strong>Date:</strong> ${new Date(contact.date).toLocaleString()}</p>
                        <p><strong>Status:</strong> ${contact.status}</p>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('contacts-container').innerHTML = '<p>Error loading contacts.</p>';
            }
        }
        
        // Load contacts when page loads
        loadContacts();
    </script>
</body>
</html>
